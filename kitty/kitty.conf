# font_family JetBrainsMono NF
font_size 13.0

# Set a rich dark charcoal base color
background #1a1a1a

# Tighten transparency so background text doesn't bleed through heavily
background_opacity 0.55

# Turn off the native macOS blur filter which causes that gray smudge look
background_blur 20

window_padding_width 24

confirm_os_window_close 0

hide_window_decorations titlebar-only

window_margin_width 5

# BEGIN_KITTY_FONTS
font_family family="JetBrainsMono Nerd Font Mono"
bold_font auto
italic_font auto
bold_italic_font auto
# END_KITTY_FONTS
macos_option_as_alt yes

paste_actions no-op
